<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQs — Raithu Bazaar 🌾</title>
    <meta name="description" content="Frequently asked questions about Raithu Bazaar for customers and farmers.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { forest: { DEFAULT: '#0f4023', light: '#1e7a3f', mid: '#2d9c5b' }, gold: { DEFAULT: '#d4a017', light: '#f0c040', dark: '#b8880f' }, cream: '#fdf8f0', mint: '#f0f9f4' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 text-gray-800">
    <div id="headerMount"></div>

    <section class="bg-gradient-to-r from-forest to-forest-light text-white py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl sm:text-5xl font-extrabold mb-4 font-[Outfit]">❓ FAQs</h1>
            <p class="text-xl text-gray-200">తరచుగా అడిగే ప్రశ్నలు | अक्सर पूछे जाने वाले प्रश्न</p>
        </div>
    </section>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <!-- Customer FAQs -->
        <section class="mb-12">
            <h2 class="text-2xl font-bold text-forest mb-6 flex items-center gap-2">🛒 For Customers <span
                    class="text-sm text-gold font-normal">(కస్టమర్ల కోసం)</span></h2>
            <div class="space-y-3" id="customerFaqs"></div>
        </section>

        <!-- Farmer FAQs -->
        <section class="mb-12">
            <h2 class="text-2xl font-bold text-forest mb-6 flex items-center gap-2">👨‍🌾 For Farmers <span
                    class="text-sm text-gold font-normal">(రైతుల కోసం)</span></h2>
            <div class="space-y-3" id="farmerFaqs"></div>
        </section>

        <section class="bg-cream rounded-3xl p-8 text-center">
            <h3 class="text-xl font-bold text-forest mb-3">Still have questions?</h3>
            <p class="text-gray-500 mb-4">ఇంకా ప్రశ్నలు ఉన్నాయా? మాకు కాల్ చేయండి!</p>
            <div class="flex flex-wrap gap-4 justify-center">
                <a href="contact.htm"
                    class="px-8 py-3 bg-forest-light text-white font-bold rounded-xl hover:bg-forest transition-all">Contact
                    Us 📧</a>
                <a href="https://wa.me/919876543210"
                    class="px-8 py-3 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 transition-all">WhatsApp
                    💬</a>
            </div>
        </section>
    </main>

    <div id="footerMount"></div>
    <script src="lang.js"></script>
    <script src="app.js"></script>
    <script src="main.js"></script>
    <script>
        const customerQs = [
            { q: 'How fresh is the produce?', a: 'All produce is harvested fresh within 12-24 hours of delivery. We do not use cold storage or warehouses. Your vegetables are picked after you order!', qTE: 'ఉత్పత్తి ఎంత తాజాగా ఉంటుంది?' },
            { q: 'What areas do you deliver to?', a: 'We currently deliver across Hyderabad, Secunderabad, and surrounding areas in Telangana. We are expanding to Andhra Pradesh soon.', qTE: 'మీరు ఏ ప్రాంతాలకు డెలివరీ చేస్తారు?' },
            { q: 'Is delivery free?', a: 'Delivery is FREE on all orders above ₹300. For orders below ₹300, a flat delivery fee of ₹30 is applied.', qTE: 'డెలివరీ ఉచితమా?' },
            { q: 'How do I pay?', a: 'We accept UPI (GPay, PhonePe, Paytm), Debit/Credit Cards, and Cash on Delivery.', qTE: 'నేను ఎలా చెల్లించాలి?' },
            { q: 'Can I return products?', a: 'If you receive damaged or stale produce, contact us within 2 hours and we will replace or refund the item immediately.', qTE: 'ఉత్పత్తులను తిరిగి ఇవ్వవచ్చా?' },
            { q: 'Are the products organic?', a: 'Many of our products are organically grown. Look for the 🌿 Organic badge on product listings. All our farmers follow minimal chemical practices.', qTE: 'ఉత్పత్తులు సేంద్రియమా?' },
        ];

        const farmerQs = [
            { q: 'Is registration free?', a: 'Absolutely! Registration is 100% free. There are no upfront fees, listing fees, or hidden charges. You only pay a small 7% platform fee on actual sales.', qTE: 'నమోదు ఉచితమా?' },
            { q: 'How much commission do you take?', a: 'We take only 7% as platform fee. Compare this with traditional mandis where middlemen take 40-60% of your produce value.', qTE: 'మీరు ఎంత కమీషన్ తీసుకుంటారు?' },
            { q: 'When do I get paid?', a: 'Payments are transferred to your bank account within 2 business days. Transfers happen every Monday and Thursday.', qTE: 'నాకు ఎప్పుడు చెల్లిస్తారు?' },
            { q: 'Do I need a smartphone?', a: 'No! You can receive orders and manage your business via WhatsApp and SMS on any phone. We also have a simple web dashboard.', qTE: 'నాకు స్మార్ట్‌ఫోన్ అవసరమా?' },
            { q: 'How does delivery work?', a: 'Our delivery team picks up produce from your farm. You just need to have it packed and ready. We handle everything else.', qTE: 'డెలివరీ ఎలా పనిచేస్తుంది?' },
            { q: 'What documents do I need?', a: 'Just your Aadhaar card and bank account details. No complex paperwork required.', qTE: 'నాకు ఏ పత్రాలు అవసరం?' },
        ];

        function renderFAQs(items, containerId) {
            document.getElementById(containerId).innerHTML = items.map((item, i) => `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <button onclick="this.parentElement.classList.toggle('faq-open'); this.querySelector('.faq-icon').classList.toggle('rotate-180')" class="w-full flex items-center justify-between p-5 text-left hover:bg-mint/30 transition-all">
                        <div>
                            <span class="font-semibold text-forest text-sm">${item.q}</span>
                            ${item.qTE ? `<span class="block text-gold text-xs mt-0.5">${item.qTE}</span>` : ''}
                        </div>
                        <svg class="faq-icon w-5 h-5 text-forest shrink-0 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div class="faq-answer px-5 pb-5 text-gray-600 text-sm hidden">${item.a}</div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('headerMount').innerHTML = RaithuBazaar.ui.getHeaderHTML('faq');
            document.getElementById('footerMount').innerHTML = RaithuBazaar.ui.getFooterHTML();
            RaithuBazaar.ui.initPage();
            renderFAQs(customerQs, 'customerFaqs');
            renderFAQs(farmerQs, 'farmerFaqs');
        });
    </script>
    <style>
        .faq-open .faq-answer {
            display: block !important;
        }
    </style>
</body>

</html>
