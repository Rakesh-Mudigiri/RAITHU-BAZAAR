<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Profile — Raithu Bazaar 🌾</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { forest: { DEFAULT: '#0f4023', light: '#1e7a3f', mid: '#2d9c5b' }, gold: { DEFAULT: '#d4a017', light: '#f0c040', dark: '#b8880f' }, cream: '#fdf8f0', mint: '#f0f9f4' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 text-gray-800">
    <div id="headerMount"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="profileContent">
            <div class="bg-gradient-to-r from-forest to-forest-light rounded-2xl p-8 text-white mb-8">
                <div class="flex flex-col sm:flex-row items-center gap-6">
                    <img id="farmerImage" src="" alt=""
                        class="w-24 h-24 sm:w-32 sm:h-32 rounded-full object-cover border-4 border-white/30">
                    <div class="text-center sm:text-left flex-1">
                        <div class="flex items-center gap-3 justify-center sm:justify-start mb-2">
                            <h1 id="farmerName" class="text-2xl sm:text-3xl font-bold"></h1>
                            <span id="farmerBadge"
                                class="px-3 py-1 bg-gold text-forest text-xs font-bold rounded-full"></span>
                        </div>
                        <p id="farmerLocation" class="text-gray-200 text-sm mb-3"></p>
                        <div class="flex flex-wrap gap-4 justify-center sm:justify-start text-sm">
                            <span>⭐ <strong id="farmerRating">0</strong> Rating</span>
                            <span>👨‍👩‍👧‍👦 <strong id="farmerFamilies">0</strong> Families</span>
                            <span>📅 Since <span id="farmerJoined"></span></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md p-6 mb-8">
                <h3 class="font-bold text-forest text-lg mb-3">🌾 My Story</h3>
                <p id="farmerStory" class="text-gray-600 leading-relaxed"></p>
                <div class="flex flex-wrap gap-2 mt-4" id="farmerCategories"></div>
            </div>

            <h3 class="text-xl font-bold text-forest mb-4">📦 Products from this Farmer</h3>
            <div id="farmerProducts" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8"></div>
            <div id="noFarmerProducts" class="hidden text-center py-12 bg-white rounded-2xl shadow-sm">
                <p class="text-gray-400">No products listed yet</p>
            </div>
        </div>

        <div id="notFound" class="hidden text-center py-20">
            <div class="text-7xl mb-4">🔍</div>
            <h2 class="text-2xl font-bold text-gray-400 mb-2">Farmer not found</h2>
            <a href="farmers-directory.htm" class="text-forest-light font-medium hover:underline">Browse all farmers
                →</a>
        </div>
    </main>

    <div id="footerMount"></div>

    <script src="lang.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('headerMount').innerHTML = RaithuBazaar.ui.getHeaderHTML('farmers');
            document.getElementById('footerMount').innerHTML = RaithuBazaar.ui.getFooterHTML();
            RaithuBazaar.ui.initPage();

            const params = new URLSearchParams(window.location.search);
            const farmerId = parseInt(params.get('id'));
            const farmer = farmerId ? RaithuBazaar.farmers.getById(farmerId) : null;

            if (!farmer) {
                document.getElementById('profileContent').classList.add('hidden');
                document.getElementById('notFound').classList.remove('hidden');
                return;
            }

            document.title = farmer.name + ' — Raithu Bazaar';
            document.getElementById('farmerImage').src = farmer.image;
            document.getElementById('farmerImage').alt = farmer.name;
            document.getElementById('farmerName').textContent = farmer.name;
            document.getElementById('farmerBadge').textContent = farmer.certified ? '✅ Verified' : '🌾 Farmer';
            document.getElementById('farmerLocation').textContent = '📍 ' + farmer.village + ', ' + farmer.state;
            document.getElementById('farmerRating').textContent = farmer.rating;
            document.getElementById('farmerFamilies').textContent = farmer.reviews || 0;
            document.getElementById('farmerJoined').textContent = new Date(farmer.joined).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
            document.getElementById('farmerStory').textContent = farmer.bio || 'This farmer is committed to providing the freshest produce directly to your home.';

            const tags = (farmer.products || []).map(tag =>
                `<span class="bg-forest-light/10 text-forest-light px-3 py-1.5 rounded-full text-xs font-medium">${tag}</span>`
            ).join('');
            document.getElementById('farmerCategories').innerHTML = tags;

            const products = RaithuBazaar.products.getByFarmer(farmerId);
            if (products.length === 0) {
                document.getElementById('noFarmerProducts').classList.remove('hidden');
            } else {
                document.getElementById('farmerProducts').innerHTML = products.map(p => `
        <div class="bg-white rounded-2xl overflow-hidden shadow-md card-hover">
          <div class="relative">
            <img src="${p.image}" alt="${p.name}" class="w-full h-44 object-cover" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'">
            ${p.organic ? '<span class="absolute top-3 left-3 bg-forest-light text-white px-2 py-1 rounded-full text-xs font-semibold">🌿 Organic</span>' : ''}
          </div>
          <div class="p-4">
            <h4 class="font-bold text-forest text-sm">${p.name}</h4>
            <p class="text-gray-400 text-xs mt-1 line-clamp-2">${p.description}</p>
            <div class="flex items-center justify-between mt-3">
              <span class="text-lg font-bold text-forest">₹${p.price}<span class="text-gray-400 text-xs">/${p.unit}</span></span>
              <button onclick="RaithuBazaar.cart.addItem(${p.id});RaithuBazaar.ui.showToast('Added to cart! 🛒')" class="px-3 py-1.5 bg-gold text-forest text-xs font-bold rounded-lg hover:bg-gold-dark hover:text-white">Add +</button>
            </div>
          </div>
        </div>`).join('');
            }
        });
    </script>
</body>

</html>
