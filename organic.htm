<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Products — Raithu Bazaar 🌾</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { forest: { DEFAULT: '#0f4023', light: '#1e7a3f', mid: '#2d9c5b' }, gold: { DEFAULT: '#d4a017', light: '#f0c040', dark: '#b8880f' }, cream: '#fdf8f0', mint: '#f0f9f4' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 text-gray-800">
    <div id="headerMount"></div>
    <section class="bg-gradient-to-r from-forest to-forest-light text-white py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl sm:text-5xl font-extrabold mb-4">🌿 Organic Collection</h1>
            <p class="text-xl text-gray-200">100% verified organic produce | సేంద్రియ ఉత్పత్తులు</p>
        </div>
    </section>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="organicGrid"></div>
    </main>
    <div id="footerMount"></div>
    <script src="lang.js"></script>
    <script src="app.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('headerMount').innerHTML = RaithuBazaar.ui.getHeaderHTML('organic');
            document.getElementById('footerMount').innerHTML = RaithuBazaar.ui.getFooterHTML();
            RaithuBazaar.ui.initPage();
            const products = RaithuBazaar.products.getOrganic();
            document.getElementById('organicGrid').innerHTML = products.map(p => {
                const farmer = RaithuBazaar.farmers.getById(p.farmer_id);
                return `<div class="bg-white rounded-2xl overflow-hidden shadow-md card-hover">
                    <div class="relative"><img src="${p.image}" alt="${p.name}" class="w-full h-48 object-cover" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'">
                    <span class="absolute top-3 left-3 bg-forest-light text-white px-3 py-1 rounded-full text-xs font-bold">🌿 Organic</span></div>
                    <div class="p-4">
                        <h3 class="font-bold text-forest">${p.name}</h3>
                        ${p.nameTE ? `<p class="text-gold text-xs">${p.nameTE}</p>` : ''}
                        ${farmer ? `<p class="text-gray-400 text-xs mt-1">${farmer.name} - ${farmer.village}</p>` : ''}
                        <p class="text-gray-500 text-xs mt-2 line-clamp-2">${p.description}</p>
                        <div class="flex items-center justify-between mt-4">
                            <span class="text-xl font-bold text-forest">₹${p.price}<span class="text-gray-400 text-xs">/${p.unit}</span></span>
                            <button onclick="RaithuBazaar.cart.addItem(${p.id});RaithuBazaar.ui.showToast('Added to cart!')" class="px-4 py-2 bg-gold text-forest text-xs font-bold rounded-lg hover:bg-gold-dark hover:text-white transition-all">Add +</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        });
    </script>
</body>

</html>
