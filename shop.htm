<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Fresh Produce — Raithu Bazaar 🌾</title>
    <meta name="description"
        content="Buy fresh farm produce directly from Indian farmers. Vegetables, fruits, rice, dairy, spices & pulses.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { forest: { DEFAULT: '#0f4023', light: '#1e7a3f', mid: '#2d9c5b' }, gold: { DEFAULT: '#d4a017', light: '#f0c040', dark: '#b8880f' }, cream: '#fdf8f0', mint: '#f0f9f4' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 text-gray-800">
    <div id="headerMount"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center gap-2 text-sm text-gray-500 mb-6">
            <a href="index.htm" class="hover:text-forest-light">Home</a><span>›</span>
            <span class="text-forest font-medium">Shop</span>
        </div>

        <!-- Category Filters -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-forest mb-6">🛒 Shop Fresh Produce</h1>
            <div class="flex flex-wrap gap-2" id="categoryFilters">
                <button onclick="filterProducts('all')"
                    class="filter-btn active px-4 py-2 rounded-full text-sm font-semibold bg-forest text-white transition-all"
                    data-cat="all">All Products</button>
            </div>
        </div>

        <!-- Sort & Count -->
        <div class="flex items-center justify-between mb-6">
            <p id="productCount" class="text-gray-500 text-sm"></p>
            <select id="sortSelect" onchange="sortProducts(this.value)"
                class="px-3 py-2 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-forest-light outline-none">
                <option value="default">Sort by: Relevance</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
                <option value="name">Name: A-Z</option>
            </select>
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <div id="footerMount"></div>

    <script src="lang.js"></script>
    <script src="app.js"></script>
    <script src="main.js"></script>
    <script>
        let currentCategory = 'all';
        let currentSort = 'default';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('headerMount').innerHTML = RaithuBazaar.ui.getHeaderHTML('shop');
            document.getElementById('footerMount').innerHTML = RaithuBazaar.ui.getFooterHTML();
            RaithuBazaar.ui.initPage();

            // Build category filter buttons
            const filtersEl = document.getElementById('categoryFilters');
            RaithuBazaar.CATEGORIES.forEach(c => {
                const btn = document.createElement('button');
                btn.setAttribute('data-cat', c.id);
                btn.className = 'filter-btn px-4 py-2 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-forest-light/10 hover:text-forest-light transition-all';
                btn.textContent = c.emoji + ' ' + c.name;
                btn.onclick = () => filterProducts(c.id);
                filtersEl.appendChild(btn);
            });

            // Organic filter
            const orgBtn = document.createElement('button');
            orgBtn.setAttribute('data-cat', 'organic');
            orgBtn.className = 'filter-btn px-4 py-2 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-forest-light/10 hover:text-forest-light transition-all';
            orgBtn.textContent = '🌿 Organic Only';
            orgBtn.onclick = () => filterProducts('organic');
            filtersEl.appendChild(orgBtn);

            // Check URL params for search
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            if (query) { filterBySearch(query); return; }

            renderProducts();
        });

        function filterProducts(category) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-cat') === category;
                btn.className = `filter-btn px-4 py-2 rounded-full text-sm font-semibold transition-all ${isActive ? 'bg-forest text-white' : 'bg-gray-100 text-gray-600 hover:bg-forest-light/10 hover:text-forest-light'}`;
            });
            renderProducts();
        }

        function filterBySearch(query) {
            const q = query.toLowerCase();
            const products = RaithuBazaar.products.getAll().filter(p =>
                p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || p.category.includes(q)
            );
            renderProductList(products, `Results for "${query}"`);
        }

        function sortProducts(sortBy) {
            currentSort = sortBy;
            renderProducts();
        }

        function renderProducts() {
            let products;
            if (currentCategory === 'all') products = RaithuBazaar.products.getAll();
            else if (currentCategory === 'organic') products = RaithuBazaar.products.getOrganic();
            else products = RaithuBazaar.products.getByCategory(currentCategory);

            if (currentSort === 'price-low') products.sort((a, b) => a.price - b.price);
            else if (currentSort === 'price-high') products.sort((a, b) => b.price - a.price);
            else if (currentSort === 'rating') products.sort((a, b) => b.rating - a.rating);
            else if (currentSort === 'name') products.sort((a, b) => a.name.localeCompare(b.name));

            const label = currentCategory === 'all' ? 'All Products' :
                currentCategory === 'organic' ? 'Organic Products' :
                    RaithuBazaar.CATEGORIES.find(c => c.id === currentCategory)?.name || '';
            renderProductList(products, label);
        }

        function renderProductList(products, label) {
            document.getElementById('productCount').textContent = `Showing ${products.length} products ${label ? '• ' + label : ''}`;

            document.getElementById('productsGrid').innerHTML = products.map(p => {
                const farmer = RaithuBazaar.farmers.getById(p.farmer_id);
                const stock = RaithuBazaar.products.getStock(p.id);
                const outOfStock = stock <= 0;
                const lowStock = stock > 0 && stock <= 10;
                const tierInfo = farmer ? RaithuBazaar.trust.getTierInfo(farmer.id) : null;
                const stockColor = outOfStock ? 'bg-red-100 text-red-600' : (lowStock ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700');
                const stockLabel = outOfStock ? 'Out of Stock' : (lowStock ? `Only ${stock} left!` : `${stock} in stock`);
                const isWished = RaithuBazaar.wishlist.isInWishlist(p.id);
                return `
        <div class="bg-white rounded-2xl overflow-hidden shadow-md card-hover group ${outOfStock ? 'opacity-75' : ''}">
          <div class="relative">
            <a href="product-detail.htm?id=${p.id}">
              <img src="${p.image}" alt="${p.name}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'">
            </a>
            <div class="absolute top-3 left-3 flex flex-col gap-1">
              ${p.organic ? '<span class="bg-forest-light text-white px-3 py-1 rounded-full text-xs font-bold">🌿 Organic</span>' : ''}
              ${tierInfo ? `<span class="${tierInfo.color} px-2 py-0.5 rounded-full text-xs font-bold">${tierInfo.icon} ${tierInfo.label}</span>` : ''}
            </div>
            <button onclick="event.stopPropagation();toggleWishlist(${p.id})" class="absolute top-3 right-3 w-8 h-8 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-all" title="Wishlist">
              <span class="text-lg ${isWished ? 'text-red-500' : 'text-gray-400'}">${isWished ? '♥' : '♡'}</span>
            </button>
            <div class="absolute bottom-3 right-3 bg-white/90 backdrop-blur-sm px-2 py-0.5 rounded-full text-xs font-bold text-gold">⭐ ${p.rating}</div>
            ${outOfStock ? '<div class="absolute inset-0 bg-white/60 backdrop-blur-[2px] flex items-center justify-center"><span class="bg-red-500 text-white px-4 py-2 rounded-full font-bold text-sm">Out of Stock</span></div>' : ''}
          </div>
          <div class="p-4">
            <a href="product-detail.htm?id=${p.id}" class="font-bold text-forest text-sm mb-0.5 hover:text-forest-light block">${p.name}</a>
            ${p.nameTE ? `<p class="text-gold text-xs mb-1">${p.nameTE}</p>` : ''}
            ${farmer ? `<a href="farmer-profile.htm?id=${farmer.id}" class="text-gray-400 text-xs hover:text-forest-light">${farmer.name} • ${farmer.village}</a>` : ''}
            <p class="text-gray-500 text-xs mt-1.5 line-clamp-2">${p.description}</p>
            <div class="flex items-center gap-2 mt-2">
              <span class="${stockColor} px-2 py-0.5 rounded-full text-xs font-semibold">${stockLabel}</span>
            </div>
            <div class="flex items-center justify-between mt-3">
              <div>
                <span class="text-xl font-bold text-forest">₹${p.price}</span>
                <span class="text-gray-400 text-xs">/${p.unit}</span>
              </div>
              ${outOfStock
                        ? '<button disabled class="px-4 py-2 bg-gray-200 text-gray-400 text-xs font-bold rounded-lg cursor-not-allowed">Sold Out</button>'
                        : `<button onclick="addToCartWithStock(${p.id}, '${p.name.replace(/'/g, "\\'")}')" class="px-4 py-2 bg-gold text-forest text-xs font-bold rounded-lg hover:bg-gold-dark hover:text-white transition-all">Add to Cart</button>`
                    }
            </div>
          </div>
        </div>`;
            }).join('');

            // Render recently viewed
            renderRecentlyViewed();
        }

        function toggleWishlist(productId) {
            const added = RaithuBazaar.wishlist.toggleItem(productId);
            RaithuBazaar.ui.showToast(added ? 'Added to wishlist ♥' : 'Removed from wishlist');
            renderProducts();
        }

        function renderRecentlyViewed() {
            let section = document.getElementById('recentlyViewedSection');
            if (!section) {
                section = document.createElement('div');
                section.id = 'recentlyViewedSection';
                section.className = 'mt-12';
                document.querySelector('main').appendChild(section);
            }
            const recent = RaithuBazaar.recentlyViewed.getProducts().slice(0, 4);
            if (recent.length === 0) { section.innerHTML = ''; return; }
            section.innerHTML = `
                <h2 class="text-xl font-bold text-forest mb-4">🕐 Recently Viewed</h2>
                <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    ${recent.map(p => {
                const f = RaithuBazaar.farmers.getById(p.farmer_id);
                return `<a href="product-detail.htm?id=${p.id}" class="bg-white rounded-xl overflow-hidden shadow-sm group card-hover block">
                            <img src="${p.image}" alt="${p.name}" class="w-full h-32 object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'">
                            <div class="p-3">
                                <h3 class="font-bold text-forest text-xs truncate">${p.name}</h3>
                                <div class="flex items-center justify-between mt-1.5"><span class="font-bold text-forest text-sm">₹${p.price}</span><span class="text-gray-400 text-xs">/${p.unit}</span></div>
                            </div>
                        </a>`;
            }).join('')}
                </div>`;
        }

        function addToCartWithStock(productId, productName) {
            const stock = RaithuBazaar.products.getStock(productId);
            const inCart = (RaithuBazaar.cart.getItems().find(i => i.productId === productId)?.qty || 0);
            if (inCart >= stock) {
                RaithuBazaar.ui.showToast('Maximum available quantity already in cart! ⚠️');
                return;
            }
            RaithuBazaar.cart.addItem(productId);
            RaithuBazaar.ui.showToast(productName + ' added to cart! 🛒');
            renderProducts(); // Refresh to update stock display
        }
    </script>
</body>

</html>
