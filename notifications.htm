<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — Raithu Bazaar 🌾</title>
    <meta name="description" content="View your notifications, order updates, and alerts on Raithu Bazaar.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { forest: { DEFAULT: '#0f4023', light: '#1e7a3f', mid: '#2d9c5b' }, gold: { DEFAULT: '#d4a017', light: '#f0c040', dark: '#b8880f' }, cream: '#fdf8f0', mint: '#f0f9f4' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 text-gray-800">
    <div id="headerMount"></div>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center gap-2 text-sm text-gray-500 mb-6">
            <a href="index.htm" class="hover:text-forest-light">Home</a><span>›</span>
            <span class="text-forest font-medium">Notifications</span>
        </div>

        <div class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold text-forest">🔔 Notifications</h1>
            <div class="flex gap-2">
                <button onclick="markAllRead()"
                    class="px-4 py-2 bg-forest-light/10 text-forest-light text-xs font-bold rounded-lg hover:bg-forest-light/20 transition-all">Mark
                    All Read</button>
                <button onclick="clearAll()"
                    class="px-4 py-2 bg-red-50 text-red-400 text-xs font-bold rounded-lg hover:bg-red-100 transition-all">Clear
                    All</button>
            </div>
        </div>

        <!-- Filter Chips -->
        <div class="flex gap-2 mb-6" id="filterChips">
            <button onclick="filterNotifs('all')"
                class="notif-filter px-4 py-2 rounded-full text-xs font-semibold bg-forest text-white"
                data-filter="all">All</button>
            <button onclick="filterNotifs('order')"
                class="notif-filter px-4 py-2 rounded-full text-xs font-semibold bg-gray-100 text-gray-600"
                data-filter="order">📦 Orders</button>
            <button onclick="filterNotifs('product')"
                class="notif-filter px-4 py-2 rounded-full text-xs font-semibold bg-gray-100 text-gray-600"
                data-filter="product">🌿 Products</button>
            <button onclick="filterNotifs('system')"
                class="notif-filter px-4 py-2 rounded-full text-xs font-semibold bg-gray-100 text-gray-600"
                data-filter="system">⚙️ System</button>
        </div>

        <div id="notifList" class="space-y-3"></div>

        <div id="noNotifs" class="hidden text-center py-20">
            <div class="text-6xl mb-4">🔔</div>
            <h2 class="text-xl font-bold text-gray-400 mb-2">No notifications</h2>
            <p class="text-gray-400 text-sm">You're all caught up! Notifications about orders and products will appear
                here.</p>
        </div>
    </main>

    <div id="footerMount"></div>

    <script src="lang.js"></script>
    <script src="app.js"></script>
    <script src="main.js"></script>
    <script>
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('headerMount').innerHTML = RaithuBazaar.ui.getHeaderHTML('');
            document.getElementById('footerMount').innerHTML = RaithuBazaar.ui.getFooterHTML();
            RaithuBazaar.ui.initPage();
            renderNotifs();
        });

        function filterNotifs(type) {
            currentFilter = type;
            document.querySelectorAll('.notif-filter').forEach(btn => {
                const isActive = btn.getAttribute('data-filter') === type;
                btn.className = `notif-filter px-4 py-2 rounded-full text-xs font-semibold ${isActive ? 'bg-forest text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'} transition-all`;
            });
            renderNotifs();
        }

        function renderNotifs() {
            let notifs = RaithuBazaar.notifs.getAll();
            if (currentFilter !== 'all') notifs = notifs.filter(n => n.type === currentFilter);

            if (notifs.length === 0) {
                document.getElementById('noNotifs').classList.remove('hidden');
                document.getElementById('notifList').innerHTML = '';
                return;
            }
            document.getElementById('noNotifs').classList.add('hidden');

            const typeIcons = { order: '📦', product: '🌿', system: '⚙️', info: 'ℹ️' };

            document.getElementById('notifList').innerHTML = notifs.map(n => {
                const icon = typeIcons[n.type] || '🔔';
                const time = formatTimeAgo(n.createdAt);
                const unreadClass = n.read ? 'bg-white' : 'bg-blue-50/50 border-l-4 border-forest-light';
                return `<div class="rounded-xl shadow-sm p-4 ${unreadClass} transition-all hover:shadow-md cursor-pointer" onclick="markAsRead('${n.id}')">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-xl bg-forest-light/10 flex items-center justify-center shrink-0">
                            <span class="text-lg">${icon}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between gap-2">
                                <p class="font-bold text-forest text-sm">${n.title}</p>
                                <span class="text-gray-400 text-xs shrink-0">${time}</span>
                            </div>
                            <p class="text-gray-500 text-sm mt-0.5">${n.message}</p>
                            ${!n.read ? '<span class="inline-block mt-1.5 w-2 h-2 bg-blue-500 rounded-full"></span>' : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function markAsRead(id) {
            RaithuBazaar.notifs.markRead(id);
            renderNotifs();
        }

        function markAllRead() {
            RaithuBazaar.notifs.markAllRead();
            RaithuBazaar.ui.showToast('All notifications marked as read ✅');
            renderNotifs();
        }

        function clearAll() {
            if (confirm('Clear all notifications?')) {
                RaithuBazaar.notifs.clear();
                RaithuBazaar.ui.showToast('Notifications cleared');
                renderNotifs();
            }
        }

        function formatTimeAgo(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        }
    </script>
</body>

</html>
