<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — Raithu Bazaar 🌾</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { forest: { DEFAULT: '#0f4023', light: '#1e7a3f', mid: '#2d9c5b' }, gold: { DEFAULT: '#d4a017', light: '#f0c040', dark: '#b8880f' }, cream: '#fdf8f0', mint: '#f0f9f4' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-inter bg-gray-50 text-gray-800">
    <div id="headerMount"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center gap-2 text-sm text-gray-500 mb-6">
            <a href="index.htm" class="hover:text-forest-light">Home</a><span>›</span>
            <a href="shop.htm" class="hover:text-forest-light">Shop</a><span>›</span>
            <span class="text-forest font-medium">Cart</span>
        </div>

        <h1 class="text-3xl font-bold text-forest mb-8">🛒 Your Cart</h1>

        <!-- Empty Cart -->
        <div id="emptyCart" class="hidden text-center py-20">
            <div class="text-7xl mb-4">🛒</div>
            <h2 class="text-2xl font-bold text-gray-400 mb-2">Your cart is empty</h2>
            <p class="text-gray-400 mb-6">Browse fresh produce from local farmers</p>
            <a href="shop.htm"
                class="inline-block px-8 py-3 bg-forest-light text-white font-bold rounded-xl hover:bg-forest transition-all">Start
                Shopping →</a>
        </div>

        <!-- Cart Content -->
        <div id="cartContent" class="hidden">
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Cart Items -->
                <div class="flex-1 space-y-4" id="cartItems"></div>

                <!-- Order Summary -->
                <div class="lg:w-80 shrink-0">
                    <div class="bg-white rounded-2xl shadow-lg p-6 sticky top-24">
                        <h3 class="text-lg font-bold text-forest mb-4">Order Summary</h3>
                        <div class="space-y-3 text-sm mb-4">
                            <div class="flex justify-between"><span class="text-gray-600">Subtotal</span><span
                                    id="subtotal" class="font-semibold text-forest">₹0</span></div>
                            <div class="flex justify-between"><span class="text-gray-600">Delivery Fee</span><span
                                    id="deliveryFee" class="font-semibold text-forest">₹0</span></div>
                            <div id="freeDeliveryNote" class="text-xs text-forest-light hidden">✅ Free delivery on
                                orders above ₹300!</div>
                            <div class="border-t pt-3 flex justify-between"><span
                                    class="font-bold text-forest">Total</span><span id="grandTotal"
                                    class="text-xl font-bold text-forest">₹0</span></div>
                        </div>
                        <a href="checkout.htm" id="checkoutBtn"
                            class="block w-full text-center py-3.5 bg-gold text-forest font-bold rounded-xl hover:bg-gold-dark hover:text-white transition-all">Proceed
                            to Checkout →</a>
                        <a href="shop.htm"
                            class="block w-full text-center py-2.5 text-forest-light text-sm font-medium mt-3 hover:underline">←
                            Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footerMount"></div>

    <script src="lang.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('headerMount').innerHTML = RaithuBazaar.ui.getHeaderHTML('cart');
            document.getElementById('footerMount').innerHTML = RaithuBazaar.ui.getFooterHTML();
            RaithuBazaar.ui.initPage();
            renderCart();
        });

        function renderCart() {
            const items = RaithuBazaar.cart.getItems();
            const emptyEl = document.getElementById('emptyCart');
            const contentEl = document.getElementById('cartContent');
            const itemsEl = document.getElementById('cartItems');

            if (items.length === 0) {
                emptyEl.classList.remove('hidden');
                contentEl.classList.add('hidden');
                return;
            }
            emptyEl.classList.add('hidden');
            contentEl.classList.remove('hidden');

            itemsEl.innerHTML = items.map(item => {
                const p = RaithuBazaar.products.getById(item.productId);
                if (!p) return '';
                const farmer = RaithuBazaar.farmers.getById(p.farmer_id);
                return `
        <div class="bg-white rounded-2xl shadow-md p-4 sm:p-6 flex gap-4 sm:gap-6 items-center">
          <img src="${p.image}" alt="${p.name}" class="w-20 h-20 sm:w-24 sm:h-24 rounded-xl object-cover" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'">
          <div class="flex-1 min-w-0">
            <h3 class="font-bold text-forest text-sm sm:text-base truncate">${p.name}</h3>
            ${farmer ? `<p class="text-gray-400 text-xs mt-0.5">${farmer.name} • ${farmer.village}</p>` : ''}
            <div class="flex items-center gap-3 mt-3">
              <button onclick="changeQty(${p.id}, ${item.qty - 1})" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-forest hover:bg-gray-200 font-bold text-sm">−</button>
              <span class="font-bold text-forest w-6 text-center">${item.qty}</span>
              <button onclick="changeQty(${p.id}, ${item.qty + 1})" class="w-8 h-8 rounded-full bg-forest-light text-white flex items-center justify-center hover:bg-forest font-bold text-sm">+</button>
            </div>
          </div>
          <div class="text-right">
            <div class="font-bold text-forest text-lg">₹${p.price * item.qty}</div>
            <div class="text-gray-400 text-xs">₹${p.price}/${p.unit}</div>
            <button onclick="removeItem(${p.id})" class="text-red-400 hover:text-red-600 text-xs mt-2 font-medium">Remove</button>
          </div>
        </div>`;
            }).join('');

            const subtotal = RaithuBazaar.cart.getTotal();
            const deliveryFee = RaithuBazaar.cart.getDeliveryFee();
            document.getElementById('subtotal').textContent = '₹' + subtotal;
            document.getElementById('deliveryFee').textContent = deliveryFee === 0 ? 'FREE' : '₹' + deliveryFee;
            document.getElementById('freeDeliveryNote').classList.toggle('hidden', deliveryFee !== 0);
            document.getElementById('grandTotal').textContent = '₹' + RaithuBazaar.cart.getGrandTotal();
        }

        function changeQty(productId, qty) {
            if (qty <= 0) { RaithuBazaar.cart.removeItem(productId); }
            else { RaithuBazaar.cart.updateQty(productId, qty); }
            renderCart();
        }

        function removeItem(productId) {
            RaithuBazaar.cart.removeItem(productId);
            RaithuBazaar.ui.showToast('Removed from cart');
            renderCart();
        }
    </script>
</body>

</html>
